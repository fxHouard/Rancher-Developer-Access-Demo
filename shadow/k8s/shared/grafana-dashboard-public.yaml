apiVersion: v1
kind: ConfigMap
metadata:
  name: message-wall-dashboard-public
  namespace: public
  labels:
    grafana_dashboard: "1"
data:
  message-wall-public.json: |
      {
      "id": null,
      "uid": "message-wall-public",
      "title": "Message Wall — Public",
      "tags": ["app", "demo"],
      "timezone": "browser",
      "refresh": "5s",
      "time": { "from": "now-15m", "to": "now" },
      "schemaVersion": 39,
      "templating": { "list": [] },
      "annotations": { "list": [] },
      "panels": [
        {
          "id": 1,
          "title": "Messages in database",
          "type": "stat",
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "expr": "max(app_messages_count{app=\"message-wall-public\"})",
            "legendFormat": "messages"
          }],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 50 },
                  { "color": "red", "value": 100 }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 2,
          "title": "Messages posted (total)",
          "type": "stat",
          "gridPos": { "h": 6, "w": 6, "x": 6, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "expr": "max(app_messages_posted_total{app=\"message-wall-public\"})",
            "legendFormat": "posted"
          }],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "blue" }
            },
            "overrides": []
          }
        },
        {
          "id": 3,
          "title": "Bulk deletes (total)",
          "type": "stat",
          "gridPos": { "h": 6, "w": 6, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "expr": "max(app_messages_deleted_total{app=\"message-wall-public\"})",
            "legendFormat": "deletes"
          }],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "orange" }
            },
            "overrides": []
          }
        },
        {
          "id": 4,
          "title": "Requests / sec",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 6 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "expr": "rate(app_http_request_duration_seconds_count{app=\"message-wall-public\"}[5m])",
            "legendFormat": "{{method}} {{path}}"
          }],
          "fieldConfig": {
            "defaults": { "unit": "reqps", "custom": { "fillOpacity": 10 } },
            "overrides": []
          }
        },
        {
          "id": 5,
          "title": "Posts / min",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 6 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "expr": "rate(app_messages_posted_total{app=\"message-wall-public\"}[5m]) * 60",
            "legendFormat": "posts/min"
          }],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "purple" },
              "custom": { "fillOpacity": 10 }
            },
            "overrides": []
          }
        },
        {
          "id": 6,
          "title": "Response time (p95)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 14 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "expr": "histogram_quantile(0.95, rate(app_http_request_duration_seconds_bucket{app=\"message-wall-public\"}[5m]))",
            "legendFormat": "p95 {{method}} {{path}}"
          }],
          "fieldConfig": {
            "defaults": { "unit": "s", "custom": { "fillOpacity": 10 } },
            "overrides": []
          }
        },
        {
          "id": 7,
          "title": "Memory usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 14 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "process_resident_memory_bytes{app=\"message-wall-public\"}",
              "legendFormat": "RSS"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "nodejs_heap_size_used_bytes{app=\"message-wall-public\"}",
              "legendFormat": "Heap used"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "bytes", "custom": { "fillOpacity": 10 } },
            "overrides": []
          }
        },
        {
          "id": 8,
          "title": "Event loop lag (p99)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 22 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "expr": "nodejs_eventloop_lag_p99_seconds{app=\"message-wall-public\"}",
            "legendFormat": "p99 lag"
          }],
          "fieldConfig": {
            "defaults": { "unit": "s", "custom": { "fillOpacity": 10 } },
            "overrides": []
          }
        }
      ]
      }
