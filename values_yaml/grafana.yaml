# Grafana (Public grafana/grafana variant)
# Pinned to 12.4.2 to match AppCo version
image:
  repository: grafana/grafana
  tag: "12.4.2"

adminPassword: demo

# ClusterIP — accessed via port-forward, avoids NodePort conflicts with AppCo
service:
  type: ClusterIP

sidecar:
  dashboards:
    enabled: true
  datasources:
    enabled: true
