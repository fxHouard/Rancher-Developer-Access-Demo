# Prometheus (Public prometheus-community variant)
# Using official Docker Hub image, pinned to match AppCo version (3.10.0)

server:
  image:
    registry: docker.io
    repository: prom/prometheus
    tag: v3.11.1
  service:
    type: ClusterIP
  # Traefik ingress — hostname overridden per-demo via helm --set from
  # the Tiltfile (root → prometheus.localhost, RDA public →
  # prometheus-public.localhost). See values_yaml/grafana.yaml for the
  # rationale (klipper-lb + RFC 6761 *.localhost short-circuit).
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - prometheus.localhost
    path: /

# Alertmanager is not used by this demo
alertmanager:
  enabled: false

# Node-exporter — disable hostNetwork to avoid port conflict
# with AppCo node-exporter (which uses hostNetwork + port 9100).
# For the CVE demo we only need the image running, not host metrics.
prometheus-node-exporter:
  hostNetwork: false
  image:
    registry: docker.io
    repository: prom/node-exporter

# Disable kube-state-metrics — not part of the CVE comparison
kube-state-metrics:
  enabled: false

# Disable pushgateway — not part of the CVE comparison
pushgateway:
  enabled: false
