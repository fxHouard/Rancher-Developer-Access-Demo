# Prometheus (AppCo variant)

# Alertmanager is not used by this demo
alertmanager:
  enabled: false

# Disable kube-state-metrics — not part of the CVE comparison
kubeStateMetrics:
  enabled: false

image:
  tag: "3.11.2-1.4"

global:
  imagePullSecrets:
  - application-collection

# Traefik ingress — http://prometheus-appco.localhost
# (see values_yaml/grafana.yaml comment for rationale)
server:
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - prometheus-appco.localhost
    path: /
