alertmanager:
  enabled: false
configmapReload:
  prometheus:
    image:
      tag: 0.90.1-15.1
global:
  imagePullSecrets:
    - application-collection
kubeStateMetrics:
  enabled: false
persistence:
  resources:
    requests:
      storage: 1Gi
prometheus-node-exporter:
  image:
    tag: 1.11.1-15.1
server:
  image:
    tag: 3.11.2-2.1
  ingress:
    enabled: true
    hosts:
      - prometheus-appco.localhost
    ingressClassName: traefik
    path: /
  persistentVolume:
    size: 1Gi
