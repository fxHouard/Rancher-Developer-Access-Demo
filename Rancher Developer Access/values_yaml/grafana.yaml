# Grafana (AppCo variant)
adminPassword: demo
image:
  tag: "12.4.3-4.1"

global:
  imagePullSecrets:
  - application-collection

service:
  type: NodePort

# Traefik ingress — http://grafana-appco.localhost
# Cookies scoped per-host → isolated from the Public variant
# (grafana-public.localhost). Rancher Desktop's klipper-lb auto-binds
# Traefik on 127.0.0.1:80; browsers short-circuit *.localhost per
# RFC 6761 → no /etc/hosts, no port-forward.
ingress:
  enabled: true
  ingressClassName: traefik
  hosts:
    - grafana-appco.localhost
  path: /

sidecar:
  dashboards:
    enabled: true
  datasources:
    enabled: true



persistence:
  enabled: true
  resources:
    requests:
      storage: 1Gi