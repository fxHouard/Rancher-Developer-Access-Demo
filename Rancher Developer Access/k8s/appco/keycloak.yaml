apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak-appco
  labels:
    app: keycloak
    variant: appco
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
      variant: appco
  template:
    metadata:
      labels:
        app: keycloak
        variant: appco
    spec:
      volumes:
        - name: realm-config
          configMap:
            name: keycloak-realm
      initContainers:
        - name: wait-for-postgres
          image: dp.apps.rancher.io/containers/postgresql:18.3-7.4
          command:
            - sh
            - -c
            - |
              until pg_isready -h PLACEHOLDER_PG_SVC -U demo; do
                echo "waiting for postgres..."; sleep 2
              done
              PGPASSWORD=demo psql -h PLACEHOLDER_PG_SVC -U demo -tc \
                "SELECT 1 FROM pg_database WHERE datname='keycloak'" | grep -q 1 \
              || PGPASSWORD=demo psql -h PLACEHOLDER_PG_SVC -U demo -c "CREATE DATABASE keycloak"
      containers:
        - name: keycloak
          image: dp.apps.rancher.io/containers/keycloak:PLACEHOLDER_KEYCLOAK_TAG
          args: ["start-dev", "--health-enabled=true", "--import-realm"]
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: realm-config
              mountPath: /opt/keycloak/data/import
          env:
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: jdbc:postgresql://PLACEHOLDER_PG_SVC:5432/keycloak
            - name: KC_DB_USERNAME
              value: demo
            - name: KC_DB_PASSWORD
              value: demo
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KEYCLOAK_ADMIN
              value: admin
            - name: KEYCLOAK_ADMIN_PASSWORD
              value: admin
          startupProbe:
            httpGet:
              path: /health/started
              port: 9000
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 1Gi
      imagePullSecrets:
        - name: application-collection
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak-appco
  labels:
    app: keycloak
    variant: appco
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  selector:
    app: keycloak
    variant: appco
