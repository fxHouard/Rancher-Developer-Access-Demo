apiVersion: apps/v1
kind: Deployment
metadata:
  name: message-wall
spec:
  replicas: 1
  selector:
    matchLabels:
      app: message-wall
  template:
    metadata:
      labels:
        app: message-wall
        variant: public
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: message-wall
          image: message-wall
          ports:
            - containerPort: 3000
          env:
            - name: DB_HOST
              value: "PLACEHOLDER_PG_SVC"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: "demo"
            - name: DB_PASSWORD
              value: "demo"
            - name: DB_NAME
              value: "demo"
            - name: KEYCLOAK_URL
              value: "http://keycloak:8080"
            # Browser-facing Keycloak URL (used for OAuth redirects).
            - name: KEYCLOAK_PUBLIC_URL
              value: "http://keycloak-public.localhost"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
